<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ED-318 Processor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --border: #334155;
            --text: #f8fafc;
            --accent: #38bdf8;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        .app-container {
            display: grid;
            grid-template-columns: 400px 1fr 400px;
            grid-template-rows: 1fr 1fr;
            height: 100vh;
            gap: 10px;
            padding: 10px;
            box-sizing: border-box;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .map-container {
            grid-row: span 2;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            border-radius: 4px;
        }

        .panel-header {
            background: rgba(0,0,0,0.2);
            padding: 10px 15px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-text-stack {
            display: flex;
            flex-direction: column;
        }

        .panel-header small {
            display: block;
            font-weight: 400;
            text-transform: none;
            color: #94a3b8;
            letter-spacing: 0;
            margin-top: 2px;
        }

        .content {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        textarea {
            flex: 1;
            background: #000;
            color: #10b981;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
            padding: 10px;
            resize: none;
        }

        .search-box, .edit-input {
            width: 100%;
            padding: 8px;
            background: #0f172a;
            border: 1px solid var(--border);
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .zone-item {
            padding: 8px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            font-size: 12px;
        }

        .zone-item:hover { background: #334155; }
        .zone-item.selected { background: var(--accent); color: #000; font-weight: bold; }

        .btn-group { display: flex; gap: 5px; }
        
        .btn {
            padding: 6px 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 11px;
            transition: 0.2s;
        }

        .btn-primary { background: var(--accent); color: #000; }
        .btn-success { background: var(--success); color: #000; }
        .btn-action { background: var(--warning); color: #000; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: white; }
        .btn-ghost.active { background: white; color: black; }

        .layer-controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background: var(--panel);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tag {
            font-size: 10px;
            padding: 2px 6px;
            background: #334155;
            border-radius: 4px;
            margin-right: 5px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="panel">
        <div class="panel-header">
            <div class="header-text-stack">
                Step 1: eAIP Reference
                <small>Should auto-match data in Step 2</small>
                <small id="matchStatus" style="color: var(--success);"></small>
            </div>
        </div>
        <div class="content">
            <input type="text" id="search" class="search-box" placeholder="Search Database...">
            <div id="zoneList" style="flex: 1; overflow-y: auto;"></div>
        </div>
    </div>

    <div class="panel map-container">
        <div id="map"></div>
        <div class="layer-controls">
            <div style="font-size: 10px; font-weight: 800; margin-bottom: 5px;">POLYGON VISIBILITY</div>
            <button id="toggleRaw" class="btn btn-ghost active" onclick="toggleLayer('raw')">Step 2 (Input Data)</button>
            <button id="toggleFinal" class="btn btn-ghost active" onclick="toggleLayer('final')">Step 3 (Processed)</button>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">
            <div class="header-text-stack">
                Step 4: Attribute Editor
                <small>If Needed</small>
            </div>
        </div>
        <div class="content">
            <label style="font-size: 10px;">TITLE</label>
            <input type="text" id="editTitle" class="edit-input">
            <label style="font-size: 10px;">IDENTIFIER</label>
            <input type="text" id="editId" class="edit-input" maxlength="7">
            <div style="margin-top: auto; display: grid; gap: 10px;">
                <button class="btn btn-action" onclick="applyEdits()">Apply Changes to Step 3</button>
                <button class="btn btn-success" onclick="download()">Download Result</button>
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">
            <div class="header-text-stack">
                Step 2: Geometry Input
                <small>Upload your file &rarr;</small>
            </div>
            <div class="btn-group">
                <button class="btn btn-ghost" onclick="document.getElementById('geoIn').click()">.geojson</button>
                <button class="btn btn-ghost" onclick="document.getElementById('kmlIn').click()">.kml/.kmz</button>
            </div>
        </div>
        <div class="content">
            <input type="file" id="geoIn" hidden accept=".geojson,.json">
            <input type="file" id="kmlIn" hidden accept=".kml,.kmz">
            <textarea id="inputGeo" placeholder="Paste or upload GeoJSON/KML..."></textarea>
            <button class="btn btn-primary" onclick="process()">Process Geometry &rarr;</button>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">Step 3: ED-318 Output</div>
        <div class="content">
            <textarea id="outputGeo" readonly></textarea>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@tmcw/togeojson@4.5.0/dist/togeojson.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
    let map, rawLayer, finalLayer, eAIPData = {};
    let selectedId = null;

    const baseLayers = {
        "Street": L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'OSM' }),
        "Satellite": L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { attribution: 'Google' }),
        "Terrain": L.tileLayer('https://mt1.google.com/vt/lyrs=p&x={x}&y={y}&z={z}', { attribution: 'Google' })
    };

    function init() {
        map = L.map('map', { center: [4.21, 101.97], zoom: 6, layers: [baseLayers.Street] });
        L.control.layers(baseLayers).addTo(map);
        
        rawLayer = L.layerGroup().addTo(map);
        finalLayer = L.layerGroup().addTo(map);

        fetch('eAIP_lookup.json').then(r => r.json()).then(data => {
            eAIPData = data;
            renderList("");
        }).catch(e => console.error("Database not found"));
    }

    function renderList(q) {
        const list = document.getElementById('zoneList');
        list.innerHTML = "";
        const filter = q.toUpperCase();
        Object.keys(eAIPData).forEach(id => {
            const entryName = eAIPData[id].properties.name;
            if(id.includes(filter) || entryName.toUpperCase().includes(filter)) {
                const div = document.createElement('div');
                div.className = `zone-item ${selectedId === id ? 'selected' : ''}`;
                div.innerHTML = `<div><span class="tag">${id}</span>${entryName}</div>`;
                div.onclick = () => selectZone(id);
                list.appendChild(div);
            }
        });
    }

    function selectZone(id) {
        selectedId = id;
        document.getElementById('editTitle').value = eAIPData[id].properties.name;
        document.getElementById('editId').value = id;
        renderList(document.getElementById('search').value);
    }

    function toggleLayer(type) {
        if(type === 'raw') {
            if(map.hasLayer(rawLayer)) { map.removeLayer(rawLayer); document.getElementById('toggleRaw').classList.remove('active'); }
            else { map.addLayer(rawLayer); document.getElementById('toggleRaw').classList.add('active'); }
        } else {
            if(map.hasLayer(finalLayer)) { map.removeLayer(finalLayer); document.getElementById('toggleFinal').classList.remove('active'); }
            else { map.addLayer(finalLayer); document.getElementById('toggleFinal').classList.add('active'); }
        }
    }

    document.getElementById('geoIn').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => handleInput(JSON.parse(ev.target.result));
        reader.readAsText(e.target.files[0]);
    };

    document.getElementById('kmlIn').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        let kmlText;
        if (file.name.endsWith('.kmz')) {
            const zip = await JSZip.loadAsync(file);
            const kmlFile = Object.values(zip.files).find(f => f.name.endsWith('.kml'));
            kmlText = await kmlFile.async("string");
        } else {
            kmlText = await file.text();
        }
        const parser = new DOMParser();
        const kmlDom = parser.parseFromString(kmlText, "text/xml");
        handleInput(toGeoJSON.kml(kmlDom));
    };

    function handleInput(data) {
        document.getElementById('inputGeo').value = JSON.stringify(data, null, 2);
        rawLayer.clearLayers();
        const l = L.geoJSON(data, { style: { color: '#38bdf8', weight: 2, dashArray: '4' } }).addTo(rawLayer);
        map.fitBounds(l.getBounds());
        
        let detected = "";
        if(data.features && data.features[0].properties) {
            detected = data.features[0].properties.name || data.features[0].properties.identifier || "";
        }
        
        if(detected) {
            const match = Object.keys(eAIPData).find(id => 
                detected.toUpperCase().includes(id) || id.includes(detected.toUpperCase())
            );
            if(match) {
                selectZone(match);
                document.getElementById('matchStatus').innerText = "AUTO-MATCH: " + match;
            }
        }
    }

    function process() {
        const input = document.getElementById('inputGeo').value;
        if(!selectedId || !input) return;
        
        const source = JSON.parse(input);
        const info = eAIPData[selectedId];

        const result = {
            "type": "FeatureCollection",
            "title": document.getElementById('editTitle').value,
            "features": source.features.map(f => ({
                "type": "Feature",
                "geometry": { 
                    ...f.geometry, 
                    "layer": { ...info.layer } 
                },
                "properties": { 
                    "identifier": document.getElementById('editId').value, 
                    "country": info.properties.country, 
                    "type": info.properties.type,
                    "purpose": info.properties.purpose,
                    "reason": info.properties.reason,
                    "restrictionConditions": info.properties.restrictionConditions
                }
            }))
        };
        updateOutput(result);
    }

    function applyEdits() {
        const text = document.getElementById('outputGeo').value;
        if(!text) return;
        let data = JSON.parse(text);
        data.title = document.getElementById('editTitle').value;
        data.features.forEach(f => f.properties.identifier = document.getElementById('editId').value);
        updateOutput(data);
    }

    function updateOutput(data) {
        document.getElementById('outputGeo').value = JSON.stringify(data, null, 2);
        finalLayer.clearLayers();
        L.geoJSON(data, { style: { color: '#22c55e', weight: 3, fillOpacity: 0.3 } }).addTo(finalLayer);
    }

    function download() {
        const blob = new Blob([document.getElementById('outputGeo').value], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${document.getElementById('editId').value}_ED318.geojson`;
        a.click();
    }

    document.getElementById('search').oninput = (e) => renderList(e.target.value);
    init();
</script>
</body>
</html>
